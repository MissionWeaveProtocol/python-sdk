name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Verify Python SDK
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: missionweaveprotocol
          POSTGRES_PASSWORD: missionweaveprotocol
          POSTGRES_USER: missionweaveprotocol
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U missionweaveprotocol -d missionweaveprotocol"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev --locked

      - name: Guard canonical naming
        shell: python
        run: |
          from __future__ import annotations

          import re
          from pathlib import Path

          root = Path(".")
          legacy_short = "".join(chr(code) for code in (97, 119, 103, 112))
          legacy_phrase = re.compile(
              r"agent[\s_-]+workgroup[\s_-]+protocol",
              re.IGNORECASE,
          )
          display_fragment = "".join(("Mission", "Weave"))
          machine_fragment = "".join(("mission", "weave"))
          environment_fragment = "".join(("MISSION", "WEAVE"))
          incomplete_identity_patterns = (
              re.compile(rf"{re.escape(display_fragment)}(?!Protocol)"),
              re.compile(rf"{re.escape(machine_fragment)}(?!protocol)"),
              re.compile(rf"{re.escape(environment_fragment)}(?!PROTOCOL)"),
          )
          approved_identities = (
              "".join((display_fragment, "Protocol")),
              "".join((machine_fragment, "protocol")),
              "".join((environment_fragment, "PROTOCOL")),
          )
          decision_record_word = "".join(chr(code) for code in (97, 100, 114))
          decision_record_pattern = re.compile(
              rf"\b{re.escape(decision_record_word)}\b",
              re.IGNORECASE,
          )
          ignored_parts = {
              ".git",
              ".mypy_cache",
              ".pytest_cache",
              ".ruff_cache",
              ".venv",
              "build",
              "dist",
          }
          violations: list[str] = []

          if any(
              not pattern.search(fragment) or pattern.search(approved)
              for pattern, fragment, approved in zip(
                  incomplete_identity_patterns,
                  (display_fragment, machine_fragment, environment_fragment),
                  approved_identities,
                  strict=True,
              )
          ):
              raise SystemExit("product identity policy self-test failed")

          for path in sorted(root.rglob("*")):
              if ignored_parts.intersection(path.parts):
                  continue
              rendered_path = path.as_posix()
              lowered_path = rendered_path.casefold()
              if legacy_short in lowered_path:
                  violations.append(f"legacy path: {rendered_path}")
              if any(pattern.search(rendered_path) for pattern in incomplete_identity_patterns):
                  violations.append(f"incomplete product identity path: {rendered_path}")
              if decision_record_word in (part.casefold() for part in path.parts):
                  violations.append(f"retired documentation path: {rendered_path}")
              if not path.is_file():
                  continue
              try:
                  content = path.read_text(encoding="utf-8")
              except UnicodeDecodeError:
                  continue
              if legacy_short in content.casefold():
                  violations.append(f"legacy identifier: {rendered_path}")
              if legacy_phrase.search(content):
                  violations.append(f"legacy protocol name: {rendered_path}")
              if any(pattern.search(content) for pattern in incomplete_identity_patterns):
                  violations.append(f"incomplete product identity: {rendered_path}")
              if decision_record_pattern.search(content):
                  violations.append(f"retired documentation reference: {rendered_path}")

          if violations:
              raise SystemExit("\n".join(violations))

      - name: Lint
        run: uv run ruff check .

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Type-check
        run: uv run mypy

      - name: Run tests
        env:
          MISSIONWEAVEPROTOCOL_TEST_POSTGRES_URL: >-
            postgresql://missionweaveprotocol:missionweaveprotocol@127.0.0.1:5432/missionweaveprotocol
        run: uv run pytest

      - name: Run conformance suite
        run: uv run missionweaveprotocol-conformance --root .

      - name: Run proof of concept
        run: uv run missionweaveprotocol-demo --workdir "${RUNNER_TEMP}/missionweaveprotocol-poc"

      - name: Build wheel and source distribution
        run: uv build

      - name: Verify installed wheel conformance bundle
        shell: bash
        run: |
          set -euo pipefail
          wheel_env="${RUNNER_TEMP}/missionweaveprotocol-wheel"
          run_root="${RUNNER_TEMP}/missionweaveprotocol-wheel-run"
          actual_output="${RUNNER_TEMP}/missionweaveprotocol-conformance.actual"
          expected_output="${RUNNER_TEMP}/missionweaveprotocol-conformance.expected"
          uv venv "${wheel_env}" --python 3.12
          uv pip install --python "${wheel_env}/bin/python" dist/*.whl
          mkdir "${run_root}"
          (
            cd "${run_root}"
            "${wheel_env}/bin/missionweaveprotocol-conformance"
          ) >"${actual_output}"
          printf '%s\n' '56/56 conformance vectors passed' >"${expected_output}"
          cmp "${expected_output}" "${actual_output}"
